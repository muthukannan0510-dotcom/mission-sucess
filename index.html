<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MISSION SUCCESS ACADEMY - LMS Login</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0056b3, #00d2ff);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px; 
            text-align: center;
        }

        .logo-area h1 {
            color: #0056b3;
            font-size: 24px;
            margin-bottom: 5px;
        }

        .logo-area p {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            color: #333;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            transition: border 0.3s;
        }

        .input-group input:focus {
            border-color: #0056b3;
            outline: none;
        }

        .login-btn {
            background-color: #0056b3;
            color: #fff;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            background-color: #004494;
        }

        .error-message {
            color: red;
            font-size: 13px;
            margin-top: 10px;
            display: none;
        }

        .footer-link {
            margin-top: 20px;
            font-size: 13px;
            color: #555;
        }

        .footer-link a {
            color: #0056b3;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo-area">
            <h1>MISSION SUCCESS ACADEMY</h1>
            <p>Welcome! Please login to your LMS dashboard.</p>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <label for="mobile">Mobile Number</label>
                <input type="text" id="mobile" placeholder="Enter 10-Digit Mobile No" maxlength="10" required>
            </div>
            
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your 6-digit password" required maxlength="6">
            </div>

            <div class="error-message" id="errorMsg">Invalid mobile number or password!</div>

            <button type="submit" class="login-btn">Login</button>
        </form>

        <div class="footer-link">
            Forgot your password? <a href="#">Contact Admin</a>
        </div>
    </div>

    <script>
        // எண்கள் (Numbers) மட்டுமே மொபைல் கட்டத்தில் டைப் செய்ய அனுமதிக்கும் குறியீடு
        document.getElementById("mobile").addEventListener("input", function() {
            this.value = this.value.replace(/[^0-9]/g, '');
        });

        document.getElementById("loginForm").addEventListener("submit", function(event) {
            event.preventDefault(); // Page refresh ஆவதை தடுக்கிறது

            const mobile = document.getElementById("mobile").value;
            const enteredPassword = document.getElementById("password").value;
            const errorMsg = document.getElementById("errorMsg");

            if (mobile.length !== 10) {
                errorMsg.textContent = "Please enter a valid 10-digit mobile number!";
                errorMsg.style.display = "block";
                return;
            }

            // Keygen Logic
            const part1 = parseInt(mobile.substring(0, 5));
            const part2 = parseInt(mobile.substring(5, 10));
            
            const calculation = (part1 * 13) + (part2 * 7) + 123456;
            const expectedPassword = ((calculation % 900000) + 100000).toString(); 

            // Password சரியா என சரிபார்த்தல்
            if(enteredPassword === expectedPassword) {
                errorMsg.style.display = "none";
                
                // Login வெற்றியடைந்தால் நேரடியாக அப்ளிகேஷனுக்குள் செல்ல (Redirect):
                window.location.href = "dashboard.html"; 
                
            } else {
                errorMsg.textContent = "Invalid mobile number or password!";
                errorMsg.style.display = "block";
            }
        });
    </script>

</body>
</html>
