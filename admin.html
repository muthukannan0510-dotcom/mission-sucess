<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin - MISSION SUCCESS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');
        body { margin: 0; font-family: 'Poppins', sans-serif; background-color: #f4f7f6; color: #333; }
        .header { background-color: #0d324d; color: white; padding: 20px; text-align: center; }
        .container { max-width: 800px; margin: 30px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .config-box { background: #fff3cd; padding: 20px; border-left: 5px solid #ffc107; border-radius: 5px; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #0056b3; }
        input[type="text"], input[type="password"], textarea, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        textarea { height: 100px; resize: vertical; }
        .q-box { background: #f9f9f9; padding: 15px; border: 1px dashed #0056b3; border-radius: 6px; margin-bottom: 15px; }
        .btn { background: #0056b3; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: 600; }
        .btn-success { background: #28a745; width: 100%; padding: 15px; font-size: 16px; margin-top: 20px; }
        .status { margin-top: 20px; font-weight: bold; text-align: center; padding: 10px; border-radius: 5px; display: none; }
        .status.success { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

    <div class="header">
        <h1>MISSION SUCCESS - SUPER ADMIN</h1>
    </div>

    <div class="container">
        
        <!-- GitHub Settings -->
        <div id="setupBlock" class="config-box">
            <h3>⚙️ GitHub அமைப்புகள்</h3>
            <div class="form-group">
                <label>GitHub Personal Access Token:</label>
                <input type="password" id="ghTokenInput" placeholder="ghp_xxxxxxxxxxxxxxxxx">
            </div>
            <div class="form-group">
                <label>Repository Name:</label>
                <input type="text" id="ghRepoInput" placeholder="username/repository">
            </div>
            <button class="btn" onclick="saveSettings()">💾 Save & Hide</button>
        </div>

        <!-- Lesson Details -->
        <div id="lessonBlock" style="display: none;">
            <h3>📚 பாட விவரங்கள்</h3>
            
            <div class="form-group">
                <label>முதன்மைப் பாடம் (Main Subject):</label>
                <select id="folderName" onchange="updateSubTopics()">
                    <option value="tamil">📘 பொதுத் தமிழ்</option>
                    <option value="gk">🌍 பொது அறிவு</option>
                    <option value="maths">🧠 திறனறிதல் (Maths)</option>
                </select>
            </div>

            <!-- புதிதாக சேர்க்கப்பட்ட உட்தலைப்பு (Sub-topic) பகுதி -->
            <div class="form-group">
                <label>உட்தலைப்பு (Sub Topic):</label>
                <select id="subTopic"></select>
            </div>

            <div class="form-group">
                <label>ஆங்கிலப் பெயர் (File Name - No spaces):</label>
                <input type="text" id="fileName" placeholder="உதா: poruthuthal" required>
            </div>
            <div class="form-group">
                <label>தலைப்பு (தமிழ் - உதா: 1. பொருத்துதல்):</label>
                <input type="text" id="lessonTitle" required>
            </div>
            <div class="form-group">
                <label>பாடக்குறிப்புகள் (Enter அழுத்தவும்):</label>
                <textarea id="lessonNotes"></textarea>
            </div>

            <h3>✍️ தேர்வு வினாக்கள்</h3>
            <div id="quizContainer"></div>
            <button type="button" class="btn" onclick="addQuestion()">+ புதிய கேள்வி சேர்</button>

            <button type="button" class="btn btn-success" id="uploadBtn" onclick="uploadToGitHub()">🚀 GitHub-ல் Upload செய்</button>
            <div id="statusMsg" class="status"></div>
        </div>
    </div>

    <script>
        const subTopicMap = {
            tamil: [
                {id: 'ilakkanam', name: 'பகுதி அ: இலக்கணம்'},
                {id: 'ilakkiyam', name: 'பகுதி ஆ: இலக்கியம்'},
                {id: 'arignargal', name: 'பகுதி இ: தமிழ் அறிஞர்கள்'}
            ],
            gk: [
                {id: 'science', name: 'அறிவியல்'},
                {id: 'history', name: 'வரலாறு மற்றும் பண்பாடு'},
                {id: 'polity', name: 'ஆட்சியியல் மற்றும் பொருளாதாரம்'}
            ],
            maths: [
                {id: 'maths', name: 'திறனறிதல் (Maths)'}
            ]
        };

        function updateSubTopics() {
            const main = document.getElementById('folderName').value;
            const sub = document.getElementById('subTopic');
            sub.innerHTML = subTopicMap[main].map(s => `<option value="${s.id}">${s.name}</option>`).join('');
        }

        function checkSettings() {
            const token = localStorage.getItem('ms_gh_token');
            const repo = localStorage.getItem('ms_gh_repo');
            if(token && repo) {
                document.getElementById('setupBlock').style.display = 'none';
                document.getElementById('lessonBlock').style.display = 'block';
                updateSubTopics(); 
            } else {
                document.getElementById('setupBlock').style.display = 'block';
                document.getElementById('lessonBlock').style.display = 'none';
            }
        }

        function saveSettings() {
            const t = document.getElementById('ghTokenInput').value.trim();
            const r = document.getElementById('ghRepoInput').value.trim();
            if(t && r) {
                localStorage.setItem('ms_gh_token', t);
                localStorage.setItem('ms_gh_repo', r);
                checkSettings();
            } else {
                alert("Token மற்றும் Repo-ஐ உள்ளிடவும்!");
            }
        }

        let qCount = 0;
        function addQuestion() {
            qCount++;
            const html = `
                <div class="q-box" id="q_${qCount}">
                    <label>கேள்வி ${qCount}:</label>
                    <input type="text" id="qtext_${qCount}" style="margin-bottom:10px;">
                    <div style="display:flex; gap:10px; margin-bottom:10px;">
                        <input type="text" id="opt0_${qCount}" placeholder="Opt 1">
                        <input type="text" id="opt1_${qCount}" placeholder="Opt 2">
                        <input type="text" id="opt2_${qCount}" placeholder="Opt 3">
                        <input type="text" id="opt3_${qCount}" placeholder="Opt 4">
                    </div>
                    <label>சரியான விடை:</label>
                    <select id="ans_${qCount}">
                        <option value="0">Opt 1</option>
                        <option value="1">Opt 2</option>
                        <option value="2">Opt 3</option>
                        <option value="3">Opt 4</option>
                    </select>
                </div>`;
            document.getElementById('quizContainer').insertAdjacentHTML('beforeend', html);
        }

        window.onload = function() { checkSettings(); addQuestion(); };

        // GitHub Base64 Encoder (Supports Tamil)
        function utf8ToBase64(str) {
            return btoa(unescape(encodeURIComponent(str)));
        }

        async function uploadToGitHub() {
            const token = localStorage.getItem('ms_gh_token');
            const repo = localStorage.getItem('ms_gh_repo');
            const folder = document.getElementById('folderName').value;
            const subTopic = document.getElementById('subTopic').value;
            const file = document.getElementById('fileName').value.trim();
            const title = document.getElementById('lessonTitle').value.trim();
            const notes = document.getElementById('lessonNotes').value.split('\n').filter(n => n.trim() !== "");
            const btn = document.getElementById('uploadBtn');
            const statusBox = document.getElementById('statusMsg');

            if(!file || !title) return alert("ஆங்கிலப் பெயர் மற்றும் தலைப்பை உள்ளிடவும்!");

            btn.innerText = "⏳ Uploading..."; btn.disabled = true;

            const quiz = [];
            for(let i=1; i<=qCount; i++) {
                const q = document.getElementById(`qtext_${i}`);
                if(q && q.value.trim() !== "") {
                    quiz.push({
                        q: q.value.trim(),
                        options: [
                            document.getElementById(`opt0_${i}`).value,
                            document.getElementById(`opt1_${i}`).value,
                            document.getElementById(`opt2_${i}`).value,
                            document.getElementById(`opt3_${i}`).value
                        ],
                        ans: parseInt(document.getElementById(`ans_${i}`).value)
                    });
                }
            }

            try {
                // 1. மாஸ்டர் Syllabus.json ஐ அப்டேட் செய்தல்
                const syllabusUrl = `https://api.github.com/repos/${repo}/contents/data/syllabus.json`;
                let syllabus = { "tamil": {}, "gk": {}, "maths": {} };
                let syllabusSha = null;

                const getSyllabus = await fetch(syllabusUrl, { headers: { "Authorization": `token ${token}` } });
                if(getSyllabus.ok) {
                    const sData = await getSyllabus.json();
                    syllabusSha = sData.sha;
                    syllabus = JSON.parse(decodeURIComponent(escape(atob(sData.content))));
                }

                if(!syllabus[folder]) syllabus[folder] = {};
                if(!syllabus[folder][subTopic]) syllabus[folder][subTopic] = [];
                
                // புதிய பாடத்தை லிஸ்டில் சேர்த்தல்
                const existingIndex = syllabus[folder][subTopic].findIndex(l => l.file === file);
                if(existingIndex >= 0) syllabus[folder][subTopic][existingIndex].title = title;
                else syllabus[folder][subTopic].push({ file: file, title: title });

                const sBody = { message: `Update Syllabus: ${title}`, content: utf8ToBase64(JSON.stringify(syllabus, null, 4)) };
                if(syllabusSha) sBody.sha = syllabusSha;
                await fetch(syllabusUrl, { method: 'PUT', headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" }, body: JSON.stringify(sBody) });

                // 2. பாடத்தை (Lesson JSON) குறிப்பிட்ட ஃபோல்டரில் சேமித்தல்
                const lessonUrl = `https://api.github.com/repos/${repo}/contents/data/${folder}/${subTopic}/${file}.json`;
                let lessonSha = null;
                const getLesson = await fetch(lessonUrl, { headers: { "Authorization": `token ${token}` } });
                if(getLesson.ok) lessonSha = (await getLesson.json()).sha;

                const lessonData = { title, notes, quiz };
                const lBody = { message: `Add/Update lesson: ${title}`, content: utf8ToBase64(JSON.stringify(lessonData, null, 4)) };
                if(lessonSha) lBody.sha = lessonSha;
                
                const putLesson = await fetch(lessonUrl, { method: 'PUT', headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" }, body: JSON.stringify(lBody) });
                
                if(putLesson.ok) {
                    statusBox.className = "status success";
                    statusBox.innerText = "🎉 வெற்றி! பாடம் Dashboard-ல் சேர்க்கப்பட்டுவிட்டது.";
                } else throw new Error("Upload Failed");

            } catch (error) {
                statusBox.className = "status error";
                statusBox.innerText = "❌ பிழை: " + error.message;
            } finally {
                statusBox.style.display = "block";
                btn.innerText = "🚀 GitHub-ல் Upload செய்"; btn.disabled = false;
                setTimeout(() => statusBox.style.display = "none", 4000);
            }
        }
    </script>
</body>
</html>
