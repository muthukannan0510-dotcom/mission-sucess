<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin - MISSION SUCCESS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');
        body { margin: 0; font-family: 'Poppins', sans-serif; background-color: #f4f7f6; color: #333; }
        .header { background-color: #0d324d; color: white; padding: 20px; text-align: center; }
        .container { max-width: 750px; margin: 40px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .config-box { background: #fff3cd; padding: 20px; border-left: 5px solid #ffc107; border-radius: 5px; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #0056b3; font-size: 14px; }
        input[type="text"], input[type="password"], select, input[type="file"] { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 15px; }
        
        .upload-box { background: #f9fbff; padding: 20px; border: 2px dashed #0056b3; border-radius: 8px; text-align: center; margin-bottom: 20px; }
        .upload-box input[type="file"] { margin-top: 10px; padding: 10px; background: white; cursor: pointer; border: 1px solid #ccc; border-radius: 5px; width: 90%; }
        
        .btn { background: #0056b3; color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; font-weight: 600; }
        .btn-success { background: #28a745; width: 100%; padding: 15px; font-size: 18px; margin-top: 10px; transition: 0.3s; }
        .btn-success:hover { background: #218838; }
        .status { margin-top: 20px; font-weight: bold; text-align: center; padding: 15px; border-radius: 5px; display: none; }
        .status.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .status.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="margin: 0;">MISSION SUCCESS - SUPER ADMIN</h1>
        <p style="margin: 5px 0 0 0; font-size: 14px;">(JSON File Auto-Upload System)</p>
    </div>

    <div class="container">
        
        <!-- GitHub Settings -->
        <div id="setupBlock" class="config-box">
            <h3 style="margin-top:0;">⚙️ GitHub அமைப்புகள்</h3>
            <div class="form-group">
                <label>GitHub Personal Access Token:</label>
                <input type="password" id="ghTokenInput" placeholder="ghp_xxxxxxxxxxxxxxxxx">
            </div>
            <div class="form-group">
                <label>Repository Name:</label>
                <input type="text" id="ghRepoInput" placeholder="உதா: muthukannan0510/mission-sucess">
            </div>
            <button class="btn" onclick="saveSettings()">💾 Save & Hide Token</button>
        </div>

        <!-- File Upload Area -->
        <div id="lessonBlock" style="display: none;">
            <h3 style="margin-top:0; color:#0d324d; border-bottom: 2px solid #e0e0e0; padding-bottom: 10px;">📁 புதிய பாடத்தைப் பதிவேற்றுக</h3>
            
            <div class="form-group">
                <label>1. முதன்மைப் பாடம் (Main Subject):</label>
                <select id="folderName" onchange="updateSubTopics()">
                    <option value="tamil">📘 பகுதி இ: தமிழ் தகுதி மற்றும் மதிப்பீட்டுத் தேர்வு</option>
                    <option value="gk">🌍 பகுதி அ: பொது அறிவு</option>
                    <option value="maths">🧠 பகுதி ஆ: திறனறிவு மற்றும் நுண்ணறிவு</option>
                </select>
            </div>

            <div class="form-group">
                <label>2. உட்தலைப்பு (Sub Topic):</label>
                <select id="subTopic"></select>
            </div>

            <div class="form-group">
                <label>3. ஆங்கிலப் பெயர் (File Name - No spaces):</label>
                <input type="text" id="fileName" placeholder="உதா: poruthuthal_1" required>
            </div>

            <div class="upload-box">
                <label style="color:#333; font-size: 16px;">4. JSON ஃபைலைத் தேர்ந்தெடுக்கவும்:</label>
                <p style="font-size:13px; color:#666; margin-top:5px;">(பாடக்குறிப்பு மற்றும் தேர்வு வினாக்கள் அடங்கிய .json ஃபைல்)</p>
                <input type="file" id="jsonFileInput" accept=".json" required>
            </div>

            <button type="button" class="btn btn-success" id="uploadBtn" onclick="processAndUpload()">🚀 நேரடியாக GitHub-ல் Upload செய்</button>
            <div id="statusMsg" class="status"></div>
        </div>
    </div>

    <script>
        // TNPSC Group 4 அதிகாரப்பூர்வ பாடத்திட்டம்
        const subTopicMap = {
            tamil: [
                {id: 'ilakkanam', name: 'அலகு I: இலக்கணம்'},
                {id: 'sollagarathi', name: 'அலகு II: சொல்லகராதி'},
                {id: 'eluthuthiran', name: 'அலகு III: எழுதும் திறன்'},
                {id: 'kalaisorkal', name: 'அலகு IV: கலைச் சொற்கள்'},
                {id: 'vasithal', name: 'அலகு V: வாசித்தல் - புரிந்து கொள்ளும் திறன்'},
                {id: 'molipeyarppu', name: 'அலகு VI: எளிய மொழி பெயர்ப்பு'},
                {id: 'ilakkiyam', name: 'அலகு VII: இலக்கியம், தமிழ் அறிஞர்களும், தமிழ்த்தொண்டும்'}
            ],
            gk: [
                {id: 'science', name: 'அலகு I: பொது அறிவியல்'},
                {id: 'geography', name: 'அலகு II: புவியியல்'},
                {id: 'history', name: 'அலகு III: இந்தியாவின் வரலாறு, பண்பாடு மற்றும் இந்திய தேசிய இயக்கம்'},
                {id: 'polity', name: 'அலகு IV: இந்திய ஆட்சியியல்'},
                {id: 'economy', name: 'அலகு V: இந்தியப் பொருளாதாரம் மற்றும் தமிழ்நாட்டில் வளர்ச்சி நிர்வாகம்'},
                {id: 'tn_history', name: 'அலகு VI: தமிழ்நாட்டின் வரலாறு, பண்பாடு, மரபு மற்றும் சமூக - அரசியல் இயக்கங்கள்'}
            ],
            maths: [
                {id: 'aptitude', name: 'அலகு I: திறனறிவு'},
                {id: 'reasoning', name: 'அலகு II: காரணவியல்'}
            ]
        };

        function updateSubTopics() {
            const main = document.getElementById('folderName').value;
            const sub = document.getElementById('subTopic');
            sub.innerHTML = subTopicMap[main].map(s => `<option value="${s.id}">${s.name}</option>`).join('');
        }

        function checkSettings() {
            const token = localStorage.getItem('ms_gh_token');
            const repo = localStorage.getItem('ms_gh_repo');
            if(token && repo) {
                document.getElementById('setupBlock').style.display = 'none';
                document.getElementById('lessonBlock').style.display = 'block';
                updateSubTopics(); 
            } else {
                document.getElementById('setupBlock').style.display = 'block';
                document.getElementById('lessonBlock').style.display = 'none';
            }
        }

        function saveSettings() {
            const t = document.getElementById('ghTokenInput').value.trim();
            const r = document.getElementById('ghRepoInput').value.trim();
            if(t && r) {
                localStorage.setItem('ms_gh_token', t);
                localStorage.setItem('ms_gh_repo', r);
                checkSettings();
            } else {
                alert("Token மற்றும் Repo-ஐ உள்ளிடவும்!");
            }
        }

        window.onload = function() { checkSettings(); };

        // ஃபைலின் பெயர் மாறும்போது தானாகவே File Name பெட்டியில் நிரப்ப
        document.getElementById('jsonFileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if(file) {
                const nameWithoutExt = file.name.replace(/\.[^/.]+$/, "");
                document.getElementById('fileName').value = nameWithoutExt.toLowerCase().replace(/\s+/g, '_');
            }
        });

        // GitHub Base64 Encoder (Supports Tamil)
        function utf8ToBase64(str) {
            return btoa(unescape(encodeURIComponent(str)));
        }

        // 1. ஃபைலைப் படித்துப் சரிபார்க்கும் செயல்முறை
        function processAndUpload() {
            const fileInput = document.getElementById('jsonFileInput');
            const file = fileInput.files[0];
            const fileNameInput = document.getElementById('fileName').value.trim();

            if(!fileNameInput) return alert("ஆங்கிலப் பெயரை உள்ளிடவும்!");
            if(!file) return alert("தயவுசெய்து ஒரு JSON ஃபைலைத் தேர்ந்தெடுக்கவும்!");

            const reader = new FileReader();
            
            reader.onload = async function(e) {
                try {
                    const lessonData = JSON.parse(e.target.result);
                    
                    if(!lessonData.title) {
                        alert("பிழை: நீங்கள் பதிவேற்றிய JSON ஃபைலில் 'title' (பாடத்தின் தலைப்பு) இல்லை!");
                        return;
                    }

                    await uploadToGitHub(lessonData, lessonData.title, fileNameInput);

                } catch (error) {
                    alert("பிழை: நீங்கள் தேர்ந்தெடுத்தது சரியான JSON ஃபைல் அல்ல. (Syntax Error: " + error.message + ")");
                }
            };

            reader.readAsText(file);
        }

        // 2. GitHub-ல் அப்லோட் செய்யும் செயல்முறை
        async function uploadToGitHub(lessonData, title, file) {
            const token = localStorage.getItem('ms_gh_token');
            const repo = localStorage.getItem('ms_gh_repo');
            const folder = document.getElementById('folderName').value;
            const subTopic = document.getElementById('subTopic').value;
            const btn = document.getElementById('uploadBtn');
            const statusBox = document.getElementById('statusMsg');

            btn.innerText = "⏳ Uploading to GitHub..."; 
            btn.disabled = true;

            try {
                // 1. மாஸ்டர் Syllabus.json ஐ அப்டேட் செய்தல்
                const syllabusUrl = `https://api.github.com/repos/${repo}/contents/data/syllabus.json`;
                let syllabus = { "tamil": {}, "gk": {}, "maths": {} };
                let syllabusSha = null;

                const getSyllabus = await fetch(syllabusUrl, { headers: { "Authorization": `token ${token}` } });
                if(getSyllabus.ok) {
                    const sData = await getSyllabus.json();
                    syllabusSha = sData.sha;
                    syllabus = JSON.parse(decodeURIComponent(escape(atob(sData.content))));
                }

                if(!syllabus[folder]) syllabus[folder] = {};
                if(!syllabus[folder][subTopic]) syllabus[folder][subTopic] = [];
                
                const existingIndex = syllabus[folder][subTopic].findIndex(l => l.file === file);
                if(existingIndex >= 0) syllabus[folder][subTopic][existingIndex].title = title;
                else syllabus[folder][subTopic].push({ file: file, title: title });

                const sBody = { message: `Update Syllabus: ${title}`, content: utf8ToBase64(JSON.stringify(syllabus, null, 4)) };
                if(syllabusSha) sBody.sha = syllabusSha;
                await fetch(syllabusUrl, { method: 'PUT', headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" }, body: JSON.stringify(sBody) });

                // 2. பாடத்தை (Uploaded JSON) குறிப்பிட்ட ஃபோல்டரில் சேமித்தல்
                const lessonUrl = `https://api.github.com/repos/${repo}/contents/data/${folder}/${subTopic}/${file}.json`;
                let lessonSha = null;
                const getLesson = await fetch(lessonUrl, { headers: { "Authorization": `token ${token}` } });
                if(getLesson.ok) lessonSha = (await getLesson.json()).sha;

                const lBody = { message: `Add/Update lesson JSON: ${title}`, content: utf8ToBase64(JSON.stringify(lessonData, null, 4)) };
                if(lessonSha) lBody.sha = lessonSha;
                
                const putLesson = await fetch(lessonUrl, { method: 'PUT', headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" }, body: JSON.stringify(lBody) });
                
                if(putLesson.ok) {
                    statusBox.className = "status success";
                    statusBox.innerText = "🎉 வெற்றி! JSON ஃபைல் வெற்றிகரமாக பதிவேற்றப்பட்டு Dashboard-ல் சேர்க்கப்பட்டது.";
                    document.getElementById('jsonFileInput').value = '';
                    document.getElementById('fileName').value = '';
                } else throw new Error("Upload Failed");

            } catch (error) {
                statusBox.className = "status error";
                statusBox.innerText = "❌ பிழை: " + error.message;
            } finally {
                statusBox.style.display = "block";
                btn.innerText = "🚀 நேரடியாக GitHub-ல் Upload செய்"; 
                btn.disabled = false;
                
                setTimeout(() => statusBox.style.display = "none", 5000);
            }
        }
    </script>
</body>
</html>
